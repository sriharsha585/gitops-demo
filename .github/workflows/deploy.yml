name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image
      run: |
        docker build -t nandam585/nginx:${{ github.run_number }} .

    - name: Push Image
      run: |
        docker push nandam585/nginx:${{ github.run_number }}

    - name: Clone GitOps Repo
      run: |
        git clone https://oauth2:${{ secrets.PAT_TOKEN }}@github.com/sriharsha585/gitops-demo.git

    - name: Update Deployment Manifest
      run: |
        cd gitops-demo

        sed -i "s|image:.*|image: nandam585/nginx:${{ github.run_number }}|g" deployment.yaml

        git config user.email "nandam585@gmail.com"
        git config user.name "nandam585"

        git add deployment.yaml

        git commit -m "Updated image to ${{ github.run_number }}" || true

        git push
